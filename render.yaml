services:
  - type: web
    name: vidmind-backend
    runtime: python
    rootDir: vidmind_Backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: GROQ_KEYS
        sync: false   # You will set this manually in the Render dashboard
    plan: free
